<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Stikers</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    @font-face {
      font-family: 'Mulish';
      src: url('fonts/Mulish-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Mulish';
      src: url('fonts/Mulish-Italic-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: italic;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Mulish', 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      background-attachment: fixed;
      color: #fff; 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
    }

    /* LIQUID GLASS */
    .liquid-glass {
      background: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(236,72,153,0.06) 100%) !important;
      backdrop-filter: blur(28px) saturate(200%) brightness(1.15) !important;
      -webkit-backdrop-filter: blur(28px) saturate(200%) brightness(1.15) !important;
      border: 1px solid rgba(255,255,255,0.15) !important;
      box-shadow: 0 12px 40px rgba(99,102,241,0.2), 0 4px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2) !important;
    }

    /* AUTH */
    #auth-screen {
      position: fixed; inset: 0; background: #0f0f1a;
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .auth-box {
      background: linear-gradient(135deg, rgba(26,26,46,0.7) 0%, rgba(30,30,60,0.6) 100%);
      border-radius: 24px; 
      padding: 40px;
      width: 340px; 
      box-shadow: 0 20px 60px rgba(99,102,241,0.4), 0 0 0 1px rgba(255,255,255,0.1);
      backdrop-filter: blur(32px) saturate(200%) brightness(1.2);
      -webkit-backdrop-filter: blur(32px) saturate(200%) brightness(1.2);
      border: 1px solid rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .auth-box::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .auth-box h1 { text-align: center; margin-bottom: 8px; font-size: 28px; }
    .auth-box p { text-align: center; color: #888; margin-bottom: 28px; font-size: 14px; }
    .auth-box input {
      width: 100%; padding: 12px 16px; margin-bottom: 12px;
      background: #0f0f1a; border: 1px solid #333; border-radius: 10px;
      color: #fff; font-size: 15px; outline: none;
    }
    .auth-box input:focus { border-color: #6366f1; }
    .btn-primary {
      width: 100%; 
      padding: 13px; 
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      border-radius: 12px; 
      color: #fff; 
      font-size: 16px; 
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    .btn-primary:hover::before {
      width: 300px;
      height: 300px;
    }
    .btn-primary:hover { 
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      box-shadow: 0 6px 25px rgba(99,102,241,0.6);
      transform: translateY(-2px);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .auth-toggle { text-align: center; margin-top: 16px; font-size: 14px; color: #888; }
    .auth-toggle span { color: #6366f1; cursor: pointer; }
    .auth-error { color: #f87171; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 18px; }

    /* MAIN LAYOUT */
    #app { display: none; flex: 1; flex-direction: column; height: 100vh; }
    header {
      background: linear-gradient(135deg, rgba(26,26,46,0.7) 0%, rgba(30,30,60,0.6) 100%);
      padding: 14px 24px;
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.12); 
      z-index: 100;
      backdrop-filter: blur(28px) saturate(200%) brightness(1.15);
      -webkit-backdrop-filter: blur(28px) saturate(200%) brightness(1.15);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    header h2 { 
      font-size: 22px; 
      background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .btn-profile {
      width: 36px; height: 36px; border-radius: 50%; border: 2px solid #6366f1;
      background: #6366f1; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0; padding: 0;
    }
    .btn-profile img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .btn-share {
      background: linear-gradient(135deg, #22c55e 0%, #10b981 100%);
      border: none; 
      border-radius: 10px;
      padding: 8px 16px; 
      color: #fff; 
      cursor: pointer; 
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; 
      align-items: center; 
      gap: 6px;
      box-shadow: 0 4px 12px rgba(34,197,94,0.3);
    }
    .btn-share:hover { 
      background: linear-gradient(135deg, #16a34a 0%, #059669 100%);
      box-shadow: 0 6px 20px rgba(34,197,94,0.5);
      transform: translateY(-2px);
    }
    .btn-share.active { 
      background: linear-gradient(135deg, #16a34a 0%, #059669 100%);
      animation: pulse-glow 2s infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 6px 20px rgba(34,197,94,0.5); }
      50% { box-shadow: 0 6px 30px rgba(34,197,94,0.8); }
    }
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #fff;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.6); }
    }
    .btn-logout {
      background: transparent; border: 1px solid #444; border-radius: 8px;
      padding: 7px 12px; color: #aaa; cursor: pointer; font-size: 13px;
    }
    .btn-logout:hover { border-color: #f87171; color: #f87171; }

    .main-content { display: flex; flex: 1; overflow: hidden; }

    /* MAP */
    #map { flex: 1; }

    /* SIDEBAR */
    #sidebar {
      width: 320px; 
      background: linear-gradient(135deg, rgba(26,26,46,0.7) 0%, rgba(30,30,60,0.6) 100%);
      display: flex;
      flex-direction: column; 
      border-left: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(28px) saturate(200%) brightness(1.15);
      -webkit-backdrop-filter: blur(28px) saturate(200%) brightness(1.15);
      box-shadow: -8px 0 32px rgba(0,0,0,0.4), inset 1px 0 0 rgba(255,255,255,0.1);
    }
    .tabs { display: flex; border-bottom: 1px solid #2a2a3e; }
    .tab {
      flex: 1; padding: 14px; text-align: center; cursor: pointer;
      font-size: 14px; color: #888; transition: all 0.2s;
    }
    .tab.active { color: #6366f1; border-bottom: 2px solid #6366f1; }

    /* FRIENDS TAB */
    #tab-friends { flex: 1; overflow-y: auto; padding: 12px; }
    .add-friend { display: flex; gap: 8px; margin-bottom: 12px; }
    .add-friend input {
      flex: 1; padding: 9px 12px; background: #0f0f1a;
      border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; outline: none;
    }
    .add-friend input:focus { border-color: #6366f1; }
    .add-friend button {
      padding: 9px 14px; background: #6366f1; border: none;
      border-radius: 8px; color: #fff; cursor: pointer; font-size: 13px;
    }
    .friend-item {
      display: flex; 
      align-items: center; 
      gap: 12px;
      padding: 12px; 
      border-radius: 12px; 
      margin-bottom: 8px;
      background: linear-gradient(135deg, rgba(15,15,26,0.8) 0%, rgba(22,33,62,0.6) 100%);
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .friend-item:hover { 
      background: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(236,72,153,0.1) 100%);
      border-color: rgba(99,102,241,0.3);
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(99,102,241,0.2);
    }
    .friend-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; flex-shrink: 0;
    }
    .friend-info { flex: 1; min-width: 0; }
    .friend-name { font-size: 14px; font-weight: 600; }
    .friend-status { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
    }
    .offline-dot { background: #555; }
    .btn-chat-small {
      background: #6366f1; border: none; border-radius: 6px;
      padding: 5px 10px; color: #fff; cursor: pointer; font-size: 12px;
    }

    /* CHAT TAB */
    #tab-chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header {
      padding: 12px 16px; border-bottom: 1px solid #2a2a3e;
      font-size: 14px; color: #888;
    }
    .chat-header span { color: #6366f1; font-weight: 600; }
    #messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg {
      max-width: 85%; padding: 9px 13px; border-radius: 12px;
      font-size: 13px; line-height: 1.4; word-break: break-word;
    }
    .msg.mine { 
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      align-self: flex-end; 
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(99,102,241,0.3);
    }
    .msg.theirs { 
      background: linear-gradient(135deg, rgba(42,42,62,0.9) 0%, rgba(50,50,80,0.8) 100%);
      align-self: flex-start; 
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .msg-sender { font-size: 11px; color: #aaa; margin-bottom: 3px; }
    .chat-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; position: sticky; bottom: 0; background: rgba(26,26,46,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 10; }
    .chat-input input {
      flex: 1; padding: 10px 14px; background: #0f0f1a;
      border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 14px; outline: none;
    }
    .chat-input input:focus { border-color: #6366f1; }
    .chat-input button {
      padding: 10px 16px; background: #6366f1; border: none;
      border-radius: 10px; color: #fff; cursor: pointer; font-size: 18px;
    }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal.show { display: flex; }
    .modal-box { 
      background: linear-gradient(135deg, rgba(26,26,46,0.85) 0%, rgba(30,30,60,0.8) 100%);
      border-radius: 24px; 
      padding: 28px; 
      width: 90%; 
      max-width: 420px; 
      backdrop-filter: blur(32px) saturate(200%) brightness(1.2);
      -webkit-backdrop-filter: blur(32px) saturate(200%) brightness(1.2);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(99,102,241,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .modal-box h3 { margin-bottom: 16px; font-size: 18px; }
    .avatar-upload-area { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 16px; }
    .avatar-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #6366f1; display: none; }
    .avatar-upload-label { padding: 10px 20px; background: #0f0f1a; border: 2px dashed #444; border-radius: 10px; cursor: pointer; font-size: 14px; color: #888; text-align: center; transition: border-color 0.2s; }
    .avatar-upload-label:hover { border-color: #6366f1; color: #fff; }
    .modal-buttons { display: flex; gap: 8px; }
    .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-cancel { background: #333; color: #fff; }
    .btn-save { background: #6366f1; color: #fff; }

    .profile-header { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 20px; font-weight: 700; }
    .profile-meta { font-size: 13px; color: #888; }
    .btn-change-avatar { background: #6366f1; border: none; border-radius: 8px; padding: 8px 18px; color: #fff; cursor: pointer; font-size: 13px; margin-top: 4px; }

    .empty-state { text-align: center; color: #555; padding: 30px 20px; font-size: 14px; }

    /* POPUP */
    .leaflet-popup-content-wrapper { background: #1a1a2e; color: #fff; border: 1px solid #333; }
    .leaflet-popup-tip { background: #1a1a2e; }
    .popup-content { text-align: center; padding: 4px; }
    .popup-content strong { display: block; font-size: 15px; margin-bottom: 4px; }
    .popup-content small { color: #888; font-size: 12px; }
    .popup-chat-btn {
      margin-top: 8px; padding: 6px 16px; background: #6366f1;
      border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 13px;
    }
    .popup-route-btn {
      margin-top: 4px; padding: 6px 16px; background: #f59e0b;
      border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 13px;
    }
    .popup-btn-row { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }

    /* STICKER MODAL */
    .sticker-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; margin-bottom: 16px; }
    .sticker-opt { font-size: 24px; cursor: pointer; text-align: center; padding: 6px; border-radius: 8px; border: 2px solid transparent; transition: border-color 0.15s; }
    .sticker-opt.selected { border-color: #6366f1; background: rgba(99,102,241,0.15); }
    .sticker-note { width: 100%; padding: 9px 12px; background: #0f0f1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 12px; resize: none; }
    .sticker-note:focus { border-color: #6366f1; }
    .map-sticker-marker { font-size: 28px; cursor: pointer; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
    .friend-dist { font-size: 11px; color: #06b6d4; margin-left: 4px; }

    /* FRIEND ACTIONS */
    .friend-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .btn-icon { background: transparent; border: 1px solid #333; border-radius: 6px; padding: 4px 7px; color: #aaa; cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .btn-icon:hover { border-color: #6366f1; color: #fff; }
    .btn-icon.danger:hover { border-color: #f87171; color: #f87171; }
    .friend-search { width: 100%; padding: 8px 12px; background: #0f0f1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 10px; }
    .friend-search:focus { border-color: #6366f1; }

    /* CHAT ENHANCEMENTS */
    .msg-wrap { display: flex; flex-direction: column; max-width: 85%; }
    .msg-wrap.mine { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.theirs { align-self: flex-start; align-items: flex-start; }
    .msg { max-width: 100%; position: relative; }
    .msg-wrap.mine .msg { background: #6366f1; border-bottom-right-radius: 4px; }
    .msg-wrap.theirs .msg { background: #2a2a3e; border-bottom-left-radius: 4px; }
    .msg-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; font-size: 11px; color: #555; }
    .msg-wrap.mine .msg-meta { justify-content: flex-end; }
    .msg-ticks { color: #888; font-size: 12px; }
    .msg-ticks.read { color: #6366f1; }
    .msg-reactions { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
    .reaction-badge { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 2px 7px; font-size: 13px; cursor: pointer; transition: background 0.15s; user-select: none; }
    .reaction-badge:hover, .reaction-badge.mine { background: rgba(99,102,241,0.25); border-color: #6366f1; }
    .reaction-picker { display: none; position: absolute; bottom: calc(100% + 6px); background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 6px 8px; gap: 4px; z-index: 50; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .reaction-picker.show { display: flex; }
    .reaction-picker span { font-size: 20px; cursor: pointer; padding: 2px 4px; border-radius: 6px; transition: background 0.1s; }
    .reaction-picker span:hover { background: rgba(255,255,255,0.1); }
    .msg-img { max-width: 200px; max-height: 200px; border-radius: 8px; display: block; cursor: pointer; margin-top: 4px; }
    .btn-del-msg { background: transparent; border: none; color: #555; cursor: pointer; font-size: 11px; padding: 0 2px; transition: color 0.15s; }
    .btn-del-msg:hover { color: #f87171; }
    .typing-indicator { font-size: 12px; color: #888; padding: 0 12px 6px; min-height: 20px; font-style: italic; }
    .chat-input-row { display: flex; gap: 8px; }
    .btn-photo { padding: 10px 12px; background: #2a2a3e; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-size: 16px; flex-shrink: 0; }
    .btn-photo:hover { background: #333; }

    /* GROUP CHAT */
    .group-chat-header { padding: 10px 16px; background: rgba(99,102,241,0.1); border-bottom: 1px solid #2a2a3e; font-size: 13px; color: #6366f1; font-weight: 600; cursor: pointer; }
    .group-chat-header:hover { background: rgba(99,102,241,0.2); }

    /* PRIVACY PANEL */
    .privacy-panel { padding: 12px; border-top: 1px solid #2a2a3e; }
    .privacy-panel h4 { font-size: 13px; color: #888; margin-bottom: 10px; }
    .privacy-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
    .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #333; border-radius: 22px; cursor: pointer; transition: background 0.2s; }
    .toggle-slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle-switch input:checked + .toggle-slider { background: #6366f1; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }
    .privacy-select { background: #0f0f1a; border: 1px solid #333; border-radius: 6px; color: #fff; padding: 4px 8px; font-size: 12px; outline: none; }
    .allowed-list { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
    .allowed-chip { background: rgba(99,102,241,0.2); border: 1px solid #6366f1; border-radius: 20px; padding: 3px 10px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .allowed-chip button { background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }

    /* FULLSCREEN IMG */
    #img-fullscreen { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 99999; cursor: zoom-out; }
    #img-fullscreen.show { display: flex; }
    #img-fullscreen img { max-width: 90vw; max-height: 90vh; border-radius: 10px; }

    .leaflet-control-attribution { display: none !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-16px); }

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, push, serverTimestamp, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── FIREBASE CONFIG ──────────────────────────────────────────────
  // Замените на ваш Firebase проект (бесплатный Spark план)
  const firebaseConfig = {
    apiKey: "AIzaSyD2Aaovux2o5mgkNw4ZlYIMYY82ZTxrfjc",
    authDomain: "makar-542c3.firebaseapp.com",
    databaseURL: "https://makar-542c3-default-rtdb.firebaseio.com",
    projectId: "makar-542c3",
    storageBucket: "makar-542c3.firebasestorage.app",
    messagingSenderId: "182935330728",
    appId: "1:182935330728:web:3d72767278a3fdf423c79d"
  };
  // ─────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  // ── COLORS ───────────────────────────────────────────────────────
  const COLORS = ['#6366f1','#ec4899','#f59e0b','#22c55e','#06b6d4','#f97316','#a855f7','#14b8a6'];
  const colorFor = name => COLORS[Math.abs([...name].reduce((a,c)=>a+c.charCodeAt(0),0)) % COLORS.length];

  // ── STATE ────────────────────────────────────────────────────────
  let currentUser = null;
  let friends = {};
  let blocked = {};
  let markers = {};
  let stickerMarkers = {};
  let chatWith = null;
  let chatUnsub = null;
  let selectedAvatar = null;
  let routeLayer = null;
  let myLat = null, myLng = null;
  let friendLocations = {};
  let isGroupChat = false;
  let autoHideTimer = null;
  let privacyAllowed = null; // null = all, Set = only these

  // ── MAP ──────────────────────────────────────────────────────────
  const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 19
  }).addTo(map);

  async function getAvatar(name) {
    const snap = await get(ref(db, `users/${name}/avatar`));
    return snap.val() || null;
  }

  function makeIcon(name, avatar = null) {
    const color = colorFor(name);
    const letter = name[0].toUpperCase();
    const content = avatar ? `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />` : letter;
    return L.divIcon({
      className: '',
      html: `<div style="
        position:relative;
        width:36px;height:44px;
        display:flex;align-items:center;justify-content:center;
      ">
        <div style="
          background:${avatar ? '#fff' : color};
          width:36px;height:36px;
          border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);
          border:3px solid #fff;
          box-shadow:0 3px 10px rgba(0,0,0,0.5);
          overflow:hidden;
        ">${avatar ? `<div style="transform:rotate(45deg);width:100%;height:100%;display:flex;align-items:center;justify-content:center">${content}</div>` : ''}</div>
        ${!avatar ? `<span style="
          position:absolute;
          top:4px;left:0;width:36px;
          text-align:center;
          color:#fff;font-weight:700;font-size:14px;
          font-family:'Mulish','Segoe UI',sans-serif;
        ">${letter}</span>` : ''}
      </div>`,
      iconSize: [36, 44], iconAnchor: [18, 44], popupAnchor: [0, -46]
    });
  }

  async function placeMarker(username, lat, lng, updatedAt) {
    const timeStr = updatedAt ? new Date(updatedAt).toLocaleTimeString('ru') : '';
    const isFriend = username !== currentUser;
    const routeBtn = isFriend ? `<button class="popup-route-btn" onclick="window.buildRoute('${username}')">🗺 Маршрут</button>` : '';
    const popupHtml = `<div class="popup-content">
      <strong>${username}</strong>
      <small>${timeStr ? 'Обновлено: ' + timeStr : ''}</small>
      <div class="popup-btn-row">
        <button class="popup-chat-btn" onclick="window.openChatWith('${username}')">💬 Написать</button>
        ${routeBtn}
      </div>
    </div>`;
    const avatar = await getAvatar(username);
    if (markers[username]) {
      markers[username].setLatLng([lat, lng]).setPopupContent(popupHtml).setIcon(makeIcon(username, avatar));
    } else {
      markers[username] = L.marker([lat, lng], { icon: makeIcon(username, avatar) })
        .addTo(map).bindPopup(popupHtml);
    }
  }

  function removeMarker(username) {
    if (markers[username]) { map.removeLayer(markers[username]); delete markers[username]; }
  }

  // ── AUTH ─────────────────────────────────────────────────────────
  let isRegister = false;
  document.getElementById('auth-switch').onclick = () => {
    isRegister = !isRegister;
    document.getElementById('auth-btn').textContent = isRegister ? 'Зарегистрироваться' : 'Войти';
    document.getElementById('auth-switch').textContent = isRegister ? 'Войти' : 'Зарегистрироваться';
    document.querySelector('.auth-box p').textContent = isRegister
      ? 'Создайте аккаунт' : 'Отслеживай друзей на карте мира';
    document.getElementById('auth-error').textContent = '';
  };

  document.getElementById('auth-btn').onclick = async () => {
    const name = document.getElementById('auth-name').value.trim();
    const pass = document.getElementById('auth-pass').value;
    const errEl = document.getElementById('auth-error');
    errEl.textContent = '';
    if (!name || !pass) { errEl.textContent = 'Заполните все поля'; return; }
    if (!/^[a-zA-Zа-яА-Я0-9_]+$/.test(name)) { errEl.textContent = 'Только буквы, цифры и _'; return; }

    const userRef = ref(db, `users/${name}`);
    const snap = await get(userRef);

    if (isRegister) {
      if (snap.exists()) { errEl.textContent = 'Имя уже занято'; return; }
      await set(userRef, { password: btoa(pass), createdAt: Date.now() });
    } else {
      if (!snap.exists()) { errEl.textContent = 'Пользователь не найден'; return; }
      if (snap.val().password !== btoa(pass)) { errEl.textContent = 'Неверный пароль'; return; }
    }

    currentUser = name;
    localStorage.setItem('fm_user', name);
    localStorage.setItem('fm_pass', btoa(pass));
    startApp();
  };

  document.getElementById('auth-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-pass').focus(); });
  document.getElementById('auth-pass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-btn').click(); });

  // ── APP START ────────────────────────────────────────────────────
  function updateProfileBtn(avatar) {
    const btn = document.getElementById('current-user-badge');
    if (avatar) {
      btn.innerHTML = `<img src="${avatar}" />`;
    } else {
      btn.textContent = currentUser[0].toUpperCase();
    }
  }

  function startApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('current-user-badge').textContent = '👤';
    loadFriends();
    loadStickers();
    loadBlocked();
    loadPrivacySettings();
    map.invalidateSize();
    getAvatar(currentUser).then(updateProfileBtn);
    requestNotifPermission();
    if (!navigator.geolocation) {
      alert('Геолокация не поддерживается браузером');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        myLat = lat; myLng = lng;
        map.setView([lat, lng], 13);
        set(ref(db, `locations/${currentUser}`), { lat, lng, updatedAt: Date.now() });
        placeMarker(currentUser, lat, lng, Date.now());
      },
      err => {
        const codes = { 1: 'Доступ запрещён — разреши геолокацию в браузере', 2: 'Позиция недоступна', 3: 'Таймаут' };
        alert('Ошибка геолокации: ' + (codes[err.code] || err.message));
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  document.getElementById('btn-logout').onclick = () => {
    localStorage.removeItem('fm_user'); localStorage.removeItem('fm_pass');
    location.reload();
  };

  // ── LOCATION ─────────────────────────────────────────────────────
  let sharingInterval = null;

  function shareLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      myLat = lat; myLng = lng;
      set(ref(db, `locations/${currentUser}`), { lat, lng, updatedAt: Date.now() });
      placeMarker(currentUser, lat, lng, Date.now());
      map.setView([lat, lng], 13);
      updateAllDistances();
    }, err => {
      const codes = { 1: 'Доступ запрещён', 2: 'Позиция недоступна', 3: 'Таймаут' };
      alert('Ошибка: ' + (codes[err.code] || err.message));
    }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
  }

  document.getElementById('btn-share-location').onclick = () => {
    if (!navigator.geolocation) { alert('Геолокация не поддерживается'); return; }
    const btn = document.getElementById('btn-share-location');
    if (sharingInterval) {
      clearInterval(sharingInterval);
      sharingInterval = null;
      btn.innerHTML = '📍 <span class="share-text">Поделиться локацией</span>';
      btn.classList.remove('active');
    } else {
      shareLocation();
      sharingInterval = setInterval(shareLocation, 30000);
      btn.innerHTML = '<span class="pulse-dot"></span> <span class="share-text">Трансляция...</span>';
      btn.classList.add('active');
    }
  };

  // ── FRIENDS ──────────────────────────────────────────────────────
  function loadFriends() {
    onValue(ref(db, `friends/${currentUser}`), snap => {
      friends = snap.val() || {};
      renderFriends();
      Object.keys(friends).forEach(watchFriendLocation);
    });
  }

  document.getElementById('btn-add-friend').onclick = addFriend;
  document.getElementById('friend-input').addEventListener('keydown', e => { if (e.key === 'Enter') addFriend(); });

  async function addFriend() {
    const name = document.getElementById('friend-input').value.trim();
    if (!name || name === currentUser) return;
    const snap = await get(ref(db, `users/${name}`));
    if (!snap.exists()) { alert('Пользователь не найден'); return; }
    await set(ref(db, `friends/${currentUser}/${name}`), true);
    await set(ref(db, `friends/${name}/${currentUser}`), true);
    document.getElementById('friend-input').value = '';
  }

  async function renderFriends() {
    const list = document.getElementById('friends-list');
    const query = (document.getElementById('friend-search')?.value || '').toLowerCase();
    const names = Object.keys(friends).filter(n => !blocked[n] && n.toLowerCase().includes(query));
    if (!names.length) {
      list.innerHTML = '<div class="empty-state">' + (Object.keys(friends).length ? 'Никто не найден' : 'Добавьте друзей по имени') + '</div>';
      return;
    }
    list.innerHTML = '';
    for (const name of names) {
      const color = colorFor(name);
      const avatar = await getAvatar(name);
      const dist = calcDistance(name);
      const distHtml = dist !== null ? `<span class="friend-dist">${formatDist(dist)}</span>` : '';
      const div = document.createElement('div');
      div.className = 'friend-item';
      div.style.animationDelay = `${names.indexOf(name) * 0.05}s`;
      div.innerHTML = `
        <div class="friend-avatar" style="background:${avatar ? 'transparent' : color}">${avatar ? `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />` : name[0].toUpperCase()}</div>
        <div class="friend-info">
          <div class="friend-name">${name}${distHtml}</div>
          <div class="friend-status" id="status-${name}">нет данных</div>
        </div>
        <div class="online-dot offline-dot" id="dot-${name}"></div>
        <div class="friend-actions">
          <button class="btn-icon" title="Чат" onclick="window.openChatWith('${name}')">💬</button>
          <button class="btn-icon danger" title="Удалить" onclick="window.removeFriend('${name}')">✕</button>
        </div>
      `;
      div.querySelector('.friend-avatar').onclick = () => window.openFriendProfile(name);
      list.appendChild(div);
    }
  }

  document.getElementById('friend-search').addEventListener('input', renderFriends);

  const watchedChats = new Set();
  function watchFriendChat(name) {
    if (watchedChats.has(name)) return;
    watchedChats.add(name);
    const chatId = getChatId(currentUser, name);
    let lastTs = Date.now();
    onValue(ref(db, `chats/${chatId}`), snap => {
      if (!snap.exists()) return;
      const msgs = Object.values(snap.val());
      msgs.forEach(msg => {
        if (msg.from !== currentUser && (msg.ts || 0) > lastTs) {
          showNotif(msg.from, msg.text || '💬 Сообщение');
        }
      });
      const tsList = msgs.map(m => m.ts).filter(Boolean);
      if (tsList.length) lastTs = Math.max(...tsList);
    });
  }

  const watchedFriends = new Set();
  function watchFriendLocation(name) {
    if (watchedFriends.has(name)) return;
    watchedFriends.add(name);
    watchFriendChat(name);
    let wasOnline = false;
    onValue(ref(db, `locations/${name}`), snap => {
      const dotEl = document.getElementById(`dot-${name}`);
      const statusEl = document.getElementById(`status-${name}`);
      if (snap.exists()) {
        const { lat, lng, updatedAt } = snap.val();
        friendLocations[name] = { lat, lng };
        placeMarker(name, lat, lng, updatedAt);
        const timeStr = new Date(updatedAt).toLocaleTimeString('ru');
        const dist = calcDistance(name);
        const distStr = dist !== null ? ` · ${formatDist(dist)}` : '';
        if (statusEl) statusEl.textContent = `📍 ${timeStr}${distStr}`;
        if (dotEl) dotEl.classList.remove('offline-dot');
        if (!wasOnline) {
          wasOnline = true;
          showNotif(name, '🟢 Появился онлайн', true);
        }
      } else {
        delete friendLocations[name];
        removeMarker(name);
        if (statusEl) statusEl.textContent = 'нет данных';
        if (dotEl) dotEl.classList.add('offline-dot');
        wasOnline = false;
      }
    });
  }

  // ── CHAT ─────────────────────────────────────────────────────────
  const REACTIONS = ['👍','❤️','😂','😮','🔥','👎'];

  window.openChatWith = name => {
    chatWith = name; isGroupChat = false;
    document.getElementById('chat-with-name').textContent = name;
    switchTab('chat');
    loadMessages();
  };

  document.getElementById('btn-group-chat').onclick = () => {
    chatWith = '__group__'; isGroupChat = true;
    document.getElementById('chat-with-name').textContent = 'Все друзья';
    switchTab('chat');
    loadMessages();
  };

  function getChatId(a, b) {
    if (a === '__group__' || b === '__group__') return '__group__';
    return [a, b].sort().join('__');
  }

  let typingTimeout = null;
  document.getElementById('msg-input').addEventListener('input', () => {
    if (!chatWith) return;
    const chatId = getChatId(currentUser, chatWith);
    set(ref(db, `typing/${chatId}/${currentUser}`), true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => remove(ref(db, `typing/${chatId}/${currentUser}`)), 2000);
  });

  let typingUnsub = null;
  function watchTyping(chatId) {
    if (typingUnsub) typingUnsub();
    typingUnsub = onValue(ref(db, `typing/${chatId}`), snap => {
      const typers = snap.val() ? Object.keys(snap.val()).filter(u => u !== currentUser) : [];
      document.getElementById('typing-indicator').textContent = typers.length ? typers.join(', ') + ' печатает...' : '';
    });
  }

  function loadMessages() {
    if (chatUnsub) chatUnsub();
    if (!chatWith) return;
    const chatId = getChatId(currentUser, chatWith);
    watchTyping(chatId);
    set(ref(db, `read/${chatId}/${currentUser}`), Date.now());
    const msgsRef = ref(db, `chats/${chatId}`);
    chatUnsub = onValue(msgsRef, snap => {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      if (!snap.exists()) {
        container.innerHTML = '<div class="empty-state">Начните общение!</div>';
        return;
      }
      Object.entries(snap.val()).forEach(([msgId, msg], idx) => {
        const isMine = msg.from === currentUser;
        const wrap = document.createElement('div');
        wrap.className = 'msg-wrap ' + (isMine ? 'mine' : 'theirs');
        wrap.style.animationDelay = `${Math.min(idx * 0.04, 0.3)}s`;

        const msgEl = document.createElement('div');
        msgEl.className = 'msg';
        msgEl.style.padding = '9px 13px';
        msgEl.style.borderRadius = '12px';
        msgEl.style.fontSize = '13px';
        msgEl.style.lineHeight = '1.4';
        msgEl.style.wordBreak = 'break-word';
        if (!isMine) msgEl.innerHTML = `<div class="msg-sender">${msg.from}</div>`;
        if (msg.img) {
          msgEl.innerHTML += `<img class="msg-img" src="${msg.img}" onclick="window.openImg('${msg.img}')" />`;
        } else {
          msgEl.innerHTML += escHtml(msg.text || '');
        }

        const picker = document.createElement('div');
        picker.className = 'reaction-picker';
        REACTIONS.forEach(r => {
          const s = document.createElement('span');
          s.textContent = r;
          s.onclick = e => { e.stopPropagation(); toggleReaction(chatId, msgId, r); picker.classList.remove('show'); };
          picker.appendChild(s);
        });
        msgEl.appendChild(picker);
        msgEl.addEventListener('dblclick', () => picker.classList.toggle('show'));
        msgEl.addEventListener('contextmenu', e => { e.preventDefault(); picker.classList.toggle('show'); });
        wrap.appendChild(msgEl);

        if (msg.reactions) {
          const reactRow = document.createElement('div');
          reactRow.className = 'msg-reactions';
          const counts = {};
          Object.entries(msg.reactions).forEach(([user, emoji]) => {
            if (!counts[emoji]) counts[emoji] = { count: 0, mine: false };
            counts[emoji].count++;
            if (user === currentUser) counts[emoji].mine = true;
          });
          Object.entries(counts).forEach(([emoji, { count, mine }]) => {
            const badge = document.createElement('span');
            badge.className = 'reaction-badge' + (mine ? ' mine' : '');
            badge.textContent = `${emoji} ${count}`;
            badge.onclick = () => toggleReaction(chatId, msgId, emoji);
            reactRow.appendChild(badge);
          });
          wrap.appendChild(reactRow);
        }

        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        if (isMine) {
          const delBtn = document.createElement('button');
          delBtn.className = 'btn-del-msg';
          delBtn.textContent = '🗑';
          delBtn.onclick = () => remove(ref(db, `chats/${chatId}/${msgId}`));
          meta.appendChild(delBtn);
          const ticks = document.createElement('span');
          ticks.className = 'msg-ticks';
          ticks.textContent = '✓✓';
          get(ref(db, `read/${chatId}/${chatWith}`)).then(s => {
            if (s.exists() && msg.ts && s.val() >= msg.ts) ticks.classList.add('read');
          });
          meta.appendChild(ticks);
        }
        wrap.appendChild(meta);
        container.appendChild(wrap);
      });
      container.scrollTop = container.scrollHeight;
    });
  }

  function toggleReaction(chatId, msgId, emoji) {
    const rRef = ref(db, `chats/${chatId}/${msgId}/reactions/${currentUser}`);
    get(rRef).then(s => { s.exists() && s.val() === emoji ? remove(rRef) : set(rRef, emoji); });
  }

  window.openImg = src => {
    document.getElementById('img-fullscreen-src').src = src;
    document.getElementById('img-fullscreen').classList.add('show');
  };
  document.getElementById('img-fullscreen').onclick = () =>
    document.getElementById('img-fullscreen').classList.remove('show');

  document.getElementById('btn-send').onclick = sendMessage;
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !chatWith) return;
    const chatId = getChatId(currentUser, chatWith);
    push(ref(db, `chats/${chatId}`), { from: currentUser, text, ts: Date.now() });
    remove(ref(db, `typing/${chatId}/${currentUser}`));
    input.value = '';
  }

  document.getElementById('btn-send-photo').onclick = () => document.getElementById('photo-file-input').click();
  document.getElementById('photo-file-input').onchange = e => {
    const file = e.target.files[0];
    if (!file || !chatWith) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const chatId = getChatId(currentUser, chatWith);
      push(ref(db, `chats/${chatId}`), { from: currentUser, img: ev.target.result, ts: Date.now() });
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  // ── PROFILE ───────────────────────────────────────────────────────
  document.getElementById('current-user-badge').onclick = async () => {
    const snap = await get(ref(db, `users/${currentUser}`));
    const data = snap.val() || {};
    const avatar = data.avatar || null;
    const color = colorFor(currentUser);
    const avatarEl = document.getElementById('my-profile-avatar');
    avatarEl.style.background = avatar ? 'transparent' : color;
    avatarEl.innerHTML = avatar ? `<img src="${avatar}" />` : currentUser[0].toUpperCase();
    document.getElementById('my-profile-name').textContent = currentUser;
    document.getElementById('my-profile-meta').textContent = data.createdAt
      ? 'Зарегистрирован: ' + new Date(data.createdAt).toLocaleDateString('ru')
      : '';
    document.getElementById('profile-modal').classList.add('show');
  };

  document.getElementById('btn-close-profile').onclick = () =>
    document.getElementById('profile-modal').classList.remove('show');

  document.getElementById('btn-open-avatar').onclick = () => {
    document.getElementById('profile-modal').classList.remove('show');
    openAvatarModal();
  };

  let friendProfileTarget = null;
  window.openFriendProfile = async name => {
    friendProfileTarget = name;
    const snap = await get(ref(db, `users/${name}`));
    const data = snap.val() || {};
    const avatar = data.avatar || null;
    const color = colorFor(name);
    const avatarEl = document.getElementById('friend-profile-avatar');
    avatarEl.style.background = avatar ? 'transparent' : color;
    avatarEl.innerHTML = avatar ? `<img src="${avatar}" />` : name[0].toUpperCase();
    document.getElementById('friend-profile-name').textContent = name;
    document.getElementById('friend-profile-meta').textContent = data.createdAt
      ? 'Зарегистрирован: ' + new Date(data.createdAt).toLocaleDateString('ru')
      : '';
    document.getElementById('friend-profile-modal').classList.add('show');
  };

  document.getElementById('btn-close-friend-profile').onclick = () =>
    document.getElementById('friend-profile-modal').classList.remove('show');

  document.getElementById('btn-profile-chat').onclick = () => {
    document.getElementById('friend-profile-modal').classList.remove('show');
    window.openChatWith(friendProfileTarget);
  };

  // ── AVATAR ───────────────────────────────────────────────────────
  function openAvatarModal() {
    selectedAvatar = null;
    const preview = document.getElementById('avatar-preview');
    preview.style.display = 'none';
    preview.src = '';
    document.getElementById('avatar-file-input').value = '';
    document.getElementById('avatar-modal').classList.add('show');
  }

  document.getElementById('avatar-upload-label').onclick = () =>
    document.getElementById('avatar-file-input').click();

  document.getElementById('avatar-file-input').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      selectedAvatar = ev.target.result;
      const preview = document.getElementById('avatar-preview');
      preview.src = selectedAvatar;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  };

  document.getElementById('btn-cancel-avatar').onclick = () => {
    document.getElementById('avatar-modal').classList.remove('show');
    selectedAvatar = null;
  };

  document.getElementById('btn-save-avatar').onclick = async () => {
    if (!selectedAvatar) { alert('Выбери фото'); return; }
    await set(ref(db, `users/${currentUser}/avatar`), selectedAvatar);
    document.getElementById('avatar-modal').classList.remove('show');
    selectedAvatar = null;
    updateProfileBtn(await getAvatar(currentUser));
    if (markers[currentUser]) {
      const pos = markers[currentUser].getLatLng();
      removeMarker(currentUser);
      placeMarker(currentUser, pos.lat, pos.lng, Date.now());
    }
    renderFriends();
  };

  // ── TABS ─────────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => switchTab(tab.dataset.tab);
  });

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.getElementById('tab-friends').style.display = name === 'friends' ? 'block' : 'none';
    document.getElementById('tab-chat').style.display = name === 'chat' ? 'flex' : 'none';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── NOTIFICATIONS ───────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  async function requestNotifPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') await Notification.requestPermission();
  }

  function showNotif(from, text, isOnline = false) {
    if (!isOnline && document.visibilityState === 'visible' && chatWith === from) return;
    if (Notification.permission !== 'granted') return;
    new Notification((isOnline ? '🟢 ' : '💬 ') + from, { body: text, icon: 'img/stikers.png' });
  }

  // ── DISTANCE ─────────────────────────────────────────────────────
  function calcDistance(name) {
    if (myLat === null || !friendLocations[name]) return null;
    const R = 6371;
    const dLat = (friendLocations[name].lat - myLat) * Math.PI / 180;
    const dLng = (friendLocations[name].lng - myLng) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(myLat*Math.PI/180) * Math.cos(friendLocations[name].lat*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function formatDist(km) {
    return km < 1 ? Math.round(km * 1000) + ' м' : km.toFixed(1) + ' км';
  }

  function updateAllDistances() {
    Object.keys(friends).forEach(name => {
      const statusEl = document.getElementById(`status-${name}`);
      if (!statusEl) return;
      const dist = calcDistance(name);
      if (dist !== null) {
        const cur = statusEl.textContent;
        const base = cur.replace(/ · .*$/, '');
        statusEl.textContent = `${base} · ${formatDist(dist)}`;
      }
    });
  }

  // ── ROUTE ────────────────────────────────────────────────────────
  window.buildRoute = async name => {
    if (myLat === null) { alert('Сначала поделись своей локацией'); return; }
    const loc = friendLocations[name];
    if (!loc) { alert('Локация друга недоступна'); return; }
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    try {
      const url = `https://router.project-osrm.org/route/v1/driving/${myLng},${myLat};${loc.lng},${loc.lat}?overview=full&geometries=geojson`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.code !== 'Ok') throw new Error();
      const coords = data.routes[0].geometry.coordinates.map(([lng, lat]) => [lat, lng]);
      const dist = (data.routes[0].distance / 1000).toFixed(1);
      const dur = Math.round(data.routes[0].duration / 60);
      routeLayer = L.polyline(coords, { color: '#f59e0b', weight: 4, opacity: 0.85, dashArray: '8,4' }).addTo(map);
      map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });
      routeLayer.bindPopup(`🗺 До ${name}: ${dist} км · ~${dur} мин`).openPopup();
    } catch { alert('Не удалось построить маршрут'); }
  };

  // ── STICKERS ─────────────────────────────────────────────────────
  const STICKERS = ['📌','⭐','🔥','❤️','😂','🎉','🏠','🍕','☕','🌊','🌲','🏔','🎵','💡','⚠️','🚀'];
  let pendingStickerLatLng = null;
  let selectedSticker = STICKERS[0];

  const grid = document.getElementById('sticker-grid');
  STICKERS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'sticker-opt' + (s === selectedSticker ? ' selected' : '');
    el.textContent = s;
    el.onclick = () => {
      selectedSticker = s;
      grid.querySelectorAll('.sticker-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
    };
    grid.appendChild(el);
  });

  document.getElementById('btn-add-sticker').onclick = () => {
    alert('Кликни на карту, чтобы поставить стикер');
    map.once('click', e => {
      pendingStickerLatLng = e.latlng;
      document.getElementById('sticker-note').value = '';
      document.getElementById('sticker-modal').classList.add('show');
    });
  };

  document.getElementById('btn-cancel-sticker').onclick = () => {
    document.getElementById('sticker-modal').classList.remove('show');
    pendingStickerLatLng = null;
  };

  document.getElementById('btn-save-sticker').onclick = async () => {
    if (!pendingStickerLatLng) return;
    const note = document.getElementById('sticker-note').value.trim();
    const { lat, lng } = pendingStickerLatLng;
    const id = await push(ref(db, 'stickers'), {
      emoji: selectedSticker, note, lat, lng,
      author: currentUser, ts: Date.now()
    });
    document.getElementById('sticker-modal').classList.remove('show');
    pendingStickerLatLng = null;
  };

  function loadStickers() {
    onValue(ref(db, 'stickers'), snap => {
      Object.values(stickerMarkers).forEach(m => map.removeLayer(m));
      stickerMarkers = {};
      if (!snap.exists()) return;
      Object.entries(snap.val()).forEach(([id, s]) => {
        const icon = L.divIcon({
          className: '',
          html: `<div class="map-sticker-marker">${s.emoji}</div>`,
          iconSize: [36, 36], iconAnchor: [18, 18], popupAnchor: [0, -20]
        });
        const popup = `<div class="popup-content"><strong>${s.emoji}</strong>${s.note ? `<br><small>${escHtml(s.note)}</small>` : ''}<br><small style="color:#888">${s.author}</small></div>`;
        stickerMarkers[id] = L.marker([s.lat, s.lng], { icon }).addTo(map).bindPopup(popup);
      });
    });
  }

  // ── FRIENDS ACTIONS ───────────────────────────────────────────────
  window.removeFriend = async name => {
    if (!confirm(`Удалить ${name} из друзей?`)) return;
    await remove(ref(db, `friends/${currentUser}/${name}`));
    await remove(ref(db, `friends/${name}/${currentUser}`));
    removeMarker(name);
    delete friendLocations[name];
  };

  function loadBlocked() {
    onValue(ref(db, `blocked/${currentUser}`), snap => {
      blocked = snap.val() || {};
      renderFriends();
    });
  }

  document.getElementById('btn-profile-remove').onclick = async () => {
    document.getElementById('friend-profile-modal').classList.remove('show');
    await window.removeFriend(friendProfileTarget);
  };

  document.getElementById('btn-profile-block').onclick = async () => {
    if (!confirm(`Заблокировать ${friendProfileTarget}?`)) return;
    await set(ref(db, `blocked/${currentUser}/${friendProfileTarget}`), true);
    await remove(ref(db, `friends/${currentUser}/${friendProfileTarget}`));
    removeMarker(friendProfileTarget);
    document.getElementById('friend-profile-modal').classList.remove('show');
  };

  // ── PRIVACY ────────────────────────────────────────────────────────
  function loadPrivacySettings() {
    onValue(ref(db, `privacy/${currentUser}`), snap => {
      const data = snap.val() || {};
      const invisible = data.invisible || false;
      document.getElementById('toggle-invisible').checked = invisible;
      if (invisible) removeMarker(currentUser);

      const autoHide = data.autoHide || 0;
      document.getElementById('auto-hide-select').value = String(autoHide);

      privacyAllowed = data.allowed ? new Set(Object.keys(data.allowed)) : null;
      renderAllowedList();
    });
  }

  document.getElementById('toggle-invisible').onchange = async e => {
    const invisible = e.target.checked;
    await set(ref(db, `privacy/${currentUser}/invisible`), invisible);
    if (invisible) {
      await remove(ref(db, `locations/${currentUser}`));
      removeMarker(currentUser);
    } else if (myLat !== null) {
      await set(ref(db, `locations/${currentUser}`), { lat: myLat, lng: myLng, updatedAt: Date.now() });
      placeMarker(currentUser, myLat, myLng, Date.now());
    }
  };

  document.getElementById('auto-hide-select').onchange = async e => {
    const mins = parseInt(e.target.value);
    await set(ref(db, `privacy/${currentUser}/autoHide`), mins);
    if (autoHideTimer) clearTimeout(autoHideTimer);
    if (mins > 0) {
      autoHideTimer = setTimeout(async () => {
        await remove(ref(db, `locations/${currentUser}`));
        removeMarker(currentUser);
      }, mins * 60 * 1000);
    }
  };

  function renderAllowedList() {
    const container = document.getElementById('allowed-list');
    const allFriends = Object.keys(friends);
    container.innerHTML = '';
    if (!allFriends.length) { container.innerHTML = '<span style="color:#555;font-size:12px">Друзья не добавлены</span>'; return; }
    allFriends.forEach(name => {
      const allowed = !privacyAllowed || privacyAllowed.has(name);
      const chip = document.createElement('div');
      chip.className = 'allowed-chip';
      chip.style.opacity = allowed ? '1' : '0.4';
      chip.innerHTML = `${name} <button title="Тоггл">${allowed ? '✓' : '✕'}</button>`;
      chip.querySelector('button').onclick = async () => {
        if (!privacyAllowed) {
          privacyAllowed = new Set(allFriends);
        }
        if (privacyAllowed.has(name)) privacyAllowed.delete(name);
        else privacyAllowed.add(name);
        const allowedObj = {};
        privacyAllowed.forEach(n => allowedObj[n] = true);
        await set(ref(db, `privacy/${currentUser}/allowed`), allowedObj);
      };
      container.appendChild(chip);
    });
  }

  // ── AUTO LOGIN ───────────────────────────────────────────────────
  const savedUser = localStorage.getItem('fm_user');
  const savedPass = localStorage.getItem('fm_pass');
  if (savedUser && savedPass) {
    get(ref(db, `users/${savedUser}`)).then(snap => {
      if (snap.exists() && snap.val().password === savedPass) {
        currentUser = savedUser;
        startApp();
      }
    });
  }
</script>
</body>
</html>
