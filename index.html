<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Stikers</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    @font-face {
      font-family: 'Mulish';
      src: url('fonts/Mulish-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Mulish';
      src: url('fonts/Mulish-Italic-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: italic;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Mulish', 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; height: 100vh; display: flex; flex-direction: column; }

    /* AUTH */
    #auth-screen {
      position: fixed; inset: 0; background: #0f0f1a;
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .auth-box {
      background: #1a1a2e; border-radius: 16px; padding: 40px;
      width: 340px; box-shadow: 0 0 40px rgba(99,102,241,0.3);
    }
    .auth-box h1 { text-align: center; margin-bottom: 8px; font-size: 28px; }
    .auth-box p { text-align: center; color: #888; margin-bottom: 28px; font-size: 14px; }
    .auth-box input {
      width: 100%; padding: 12px 16px; margin-bottom: 12px;
      background: #0f0f1a; border: 1px solid #333; border-radius: 10px;
      color: #fff; font-size: 15px; outline: none;
    }
    .auth-box input:focus { border-color: #6366f1; }
    .btn-primary {
      width: 100%; padding: 13px; background: #6366f1; border: none;
      border-radius: 10px; color: #fff; font-size: 16px; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #4f46e5; }
    .auth-toggle { text-align: center; margin-top: 16px; font-size: 14px; color: #888; }
    .auth-toggle span { color: #6366f1; cursor: pointer; }
    .auth-error { color: #f87171; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 18px; }

    /* MAIN LAYOUT */
    #app { display: none; flex: 1; flex-direction: column; height: 100vh; }
    header {
      background: #1a1a2e; padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #2a2a3e; z-index: 100;
    }
    header h2 { font-size: 20px; color: #6366f1; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .btn-profile {
      width: 36px; height: 36px; border-radius: 50%; border: 2px solid #6366f1;
      background: #6366f1; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0; padding: 0;
    }
    .btn-profile img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .btn-share {
      background: #22c55e; border: none; border-radius: 8px;
      padding: 7px 14px; color: #fff; cursor: pointer; font-size: 13px;
      transition: background 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-share:hover { background: #16a34a; }
    .btn-share.active { background: #16a34a; }
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #fff;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.6); }
    }
    .btn-logout {
      background: transparent; border: 1px solid #444; border-radius: 8px;
      padding: 7px 12px; color: #aaa; cursor: pointer; font-size: 13px;
    }
    .btn-logout:hover { border-color: #f87171; color: #f87171; }

    .main-content { display: flex; flex: 1; overflow: hidden; }

    /* MAP */
    #map { flex: 1; }

    /* SIDEBAR */
    #sidebar {
      width: 300px; background: #1a1a2e; display: flex;
      flex-direction: column; border-left: 1px solid #2a2a3e;
    }
    .tabs { display: flex; border-bottom: 1px solid #2a2a3e; }
    .tab {
      flex: 1; padding: 14px; text-align: center; cursor: pointer;
      font-size: 14px; color: #888; transition: all 0.2s;
    }
    .tab.active { color: #6366f1; border-bottom: 2px solid #6366f1; }

    /* FRIENDS TAB */
    #tab-friends { flex: 1; overflow-y: auto; padding: 12px; }
    .add-friend { display: flex; gap: 8px; margin-bottom: 12px; }
    .add-friend input {
      flex: 1; padding: 9px 12px; background: #0f0f1a;
      border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; outline: none;
    }
    .add-friend input:focus { border-color: #6366f1; }
    .add-friend button {
      padding: 9px 14px; background: #6366f1; border: none;
      border-radius: 8px; color: #fff; cursor: pointer; font-size: 13px;
    }
    .friend-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border-radius: 10px; margin-bottom: 6px;
      background: #0f0f1a; cursor: pointer; transition: background 0.2s;
    }
    .friend-item:hover { background: #16213e; }
    .friend-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; flex-shrink: 0;
    }
    .friend-info { flex: 1; min-width: 0; }
    .friend-name { font-size: 14px; font-weight: 600; }
    .friend-status { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
    }
    .offline-dot { background: #555; }
    .btn-chat-small {
      background: #6366f1; border: none; border-radius: 6px;
      padding: 5px 10px; color: #fff; cursor: pointer; font-size: 12px;
    }

    /* CHAT TAB */
    #tab-chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header {
      padding: 12px 16px; border-bottom: 1px solid #2a2a3e;
      font-size: 14px; color: #888;
    }
    .chat-header span { color: #6366f1; font-weight: 600; }
    #messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg {
      max-width: 85%; padding: 9px 13px; border-radius: 12px;
      font-size: 13px; line-height: 1.4; word-break: break-word;
    }
    .msg.mine { background: #6366f1; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.theirs { background: #2a2a3e; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg-sender { font-size: 11px; color: #aaa; margin-bottom: 3px; }
    .chat-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #2a2a3e; flex-shrink: 0; position: sticky; bottom: 0; background: #1a1a2e; z-index: 10; }
    .chat-input input {
      flex: 1; padding: 10px 14px; background: #0f0f1a;
      border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 14px; outline: none;
    }
    .chat-input input:focus { border-color: #6366f1; }
    .chat-input button {
      padding: 10px 16px; background: #6366f1; border: none;
      border-radius: 10px; color: #fff; cursor: pointer; font-size: 18px;
    }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal.show { display: flex; }
    .modal-box { background: #1a1a2e; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
    .modal-box h3 { margin-bottom: 16px; font-size: 18px; }
    .avatar-upload-area { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 16px; }
    .avatar-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #6366f1; display: none; }
    .avatar-upload-label { padding: 10px 20px; background: #0f0f1a; border: 2px dashed #444; border-radius: 10px; cursor: pointer; font-size: 14px; color: #888; text-align: center; transition: border-color 0.2s; }
    .avatar-upload-label:hover { border-color: #6366f1; color: #fff; }
    .modal-buttons { display: flex; gap: 8px; }
    .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-cancel { background: #333; color: #fff; }
    .btn-save { background: #6366f1; color: #fff; }

    .profile-header { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 20px; font-weight: 700; }
    .profile-meta { font-size: 13px; color: #888; }
    .btn-change-avatar { background: #6366f1; border: none; border-radius: 8px; padding: 8px 18px; color: #fff; cursor: pointer; font-size: 13px; margin-top: 4px; }

    .empty-state { text-align: center; color: #555; padding: 30px 20px; font-size: 14px; }

    /* POPUP */
    .leaflet-popup-content-wrapper { background: #1a1a2e; color: #fff; border: 1px solid #333; }
    .leaflet-popup-tip { background: #1a1a2e; }
    .popup-content { text-align: center; padding: 4px; }
    .popup-content strong { display: block; font-size: 15px; margin-bottom: 4px; }
    .popup-content small { color: #888; font-size: 12px; }
    .popup-chat-btn {
      margin-top: 8px; padding: 6px 16px; background: #6366f1;
      border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 13px;
    }

    .leaflet-control-attribution { display: none !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    @media (max-width: 600px) {
      .auth-box { width: 92vw; padding: 28px 20px; }

      header { padding: 8px 10px; }
      header > div:first-child img { height: 28px !important; }
      header h2 { font-size: 15px; }
      .header-right { gap: 6px; }
      .btn-share .share-text { display: none; }
      .btn-share { padding: 7px 10px; font-size: 16px; }
      .btn-logout { font-size: 11px; padding: 6px 8px; }

      .main-content { flex-direction: column; }
      #map { flex: 1; min-height: 0; }
      #sidebar {
        width: 100%; height: 45vh;
        border-left: none; border-top: 1px solid #2a2a3e;
        flex-shrink: 0; overflow: hidden;
      }
      #tab-chat { height: 100%; overflow-y: auto; }
      #messages { flex: 1; min-height: 0; overflow-y: auto; }
      .chat-input { flex-shrink: 0; }
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <img src="img/stikers.png" style="height:36px;margin-bottom:6px" /><h1>Stikers</h1>
    <p>Отслеживай друзей на карте мира</p>
    <div class="auth-error" id="auth-error"></div>
    <input type="text" id="auth-name" placeholder="Имя пользователя" maxlength="20" />
    <input type="password" id="auth-pass" placeholder="Пароль" />
    <button class="btn-primary" id="auth-btn">Войти</button>
    <div class="auth-toggle">
      Нет аккаунта? <span id="auth-switch">Зарегистрироваться</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:10px">
      <img src="img/stikers.png" style="height:48px;filter:brightness(0) invert(1)" />
      <h2>Stikers</h2>
    </div>
    <div class="header-right">
      <button class="btn-profile" id="current-user-badge" title="Мой профиль"></button>
      <button class="btn-share" id="btn-share-location">📍 <span class="share-text">Поделиться локацией</span></button>
      <button class="btn-logout" id="btn-logout">Выйти</button>
    </div>
  </header>
  <div class="main-content">
    <div id="map"></div>
    <div id="sidebar">
      <div class="tabs">
        <div class="tab active" data-tab="friends">👥 Друзья</div>
        <div class="tab" data-tab="chat">💬 Чат</div>
      </div>
      <div id="tab-friends">
        <div class="add-friend">
          <input type="text" id="friend-input" placeholder="Имя друга..." maxlength="20" />
          <button id="btn-add-friend">+</button>
        </div>
        <div id="friends-list"></div>
      </div>
      <div id="tab-chat" style="display:none;">
        <div class="chat-header">Чат с: <span id="chat-with-name">выберите друга</span></div>
        <div id="messages"></div>
        <div class="chat-input">
          <input type="text" id="msg-input" placeholder="Сообщение..." maxlength="500" />
          <button id="btn-send">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PROFILE MODAL (свой) -->
<div class="modal" id="profile-modal">
  <div class="modal-box">
    <div class="profile-header">
      <div class="profile-avatar" id="my-profile-avatar"></div>
      <div class="profile-name" id="my-profile-name"></div>
      <div class="profile-meta" id="my-profile-meta"></div>
      <button class="btn-change-avatar" id="btn-open-avatar">🖼 Сменить аватар</button>
    </div>
    <div class="modal-buttons">
      <button class="btn-cancel" id="btn-close-profile">Закрыть</button>
    </div>
  </div>
</div>

<!-- FRIEND PROFILE MODAL (чужой) -->
<div class="modal" id="friend-profile-modal">
  <div class="modal-box">
    <div class="profile-header">
      <div class="profile-avatar" id="friend-profile-avatar"></div>
      <div class="profile-name" id="friend-profile-name"></div>
      <div class="profile-meta" id="friend-profile-meta"></div>
    </div>
    <div class="modal-buttons">
      <button class="btn-cancel" id="btn-close-friend-profile">Закрыть</button>
      <button class="btn-save" id="btn-profile-chat">💬 Написать</button>
    </div>
  </div>
</div>

<!-- AVATAR MODAL -->
<div class="modal" id="avatar-modal">
  <div class="modal-box">
    <h3>Загрузи фото</h3>
    <div class="avatar-upload-area">
      <img id="avatar-preview" class="avatar-preview" />
      <label class="avatar-upload-label" id="avatar-upload-label">📁 Выбрать фото</label>
      <input type="file" id="avatar-file-input" accept="image/*" style="position:absolute;opacity:0;width:0;height:0" />
    </div>
    <div class="modal-buttons">
      <button class="btn-cancel" id="btn-cancel-avatar">Отмена</button>
      <button class="btn-save" id="btn-save-avatar">Сохранить</button>
    </div>
  </div>
</div>

<!-- НЕХЕРА ВАШИ СКРИПТЫ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, push, serverTimestamp, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── FIREBASE CONFIG ──────────────────────────────────────────────
  // Замените на ваш Firebase проект (бесплатный Spark план)
  const firebaseConfig = {
    apiKey: "AIzaSyD2Aaovux2o5mgkNw4ZlYIMYY82ZTxrfjc",
    authDomain: "makar-542c3.firebaseapp.com",
    databaseURL: "https://makar-542c3-default-rtdb.firebaseio.com",
    projectId: "makar-542c3",
    storageBucket: "makar-542c3.firebasestorage.app",
    messagingSenderId: "182935330728",
    appId: "1:182935330728:web:3d72767278a3fdf423c79d"
  };
  // ─────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  // ── COLORS ───────────────────────────────────────────────────────
  const COLORS = ['#6366f1','#ec4899','#f59e0b','#22c55e','#06b6d4','#f97316','#a855f7','#14b8a6'];
  const colorFor = name => COLORS[Math.abs([...name].reduce((a,c)=>a+c.charCodeAt(0),0)) % COLORS.length];

  // ── STATE ────────────────────────────────────────────────────────
  let currentUser = null;
  let friends = {};
  let markers = {};
  let chatWith = null;
  let chatUnsub = null;
  let selectedAvatar = null;

  // ── MAP ──────────────────────────────────────────────────────────
  const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 19
  }).addTo(map);

  async function getAvatar(name) {
    const snap = await get(ref(db, `users/${name}/avatar`));
    return snap.val() || null;
  }

  function makeIcon(name, avatar = null) {
    const color = colorFor(name);
    const letter = name[0].toUpperCase();
    const content = avatar ? `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />` : letter;
    return L.divIcon({
      className: '',
      html: `<div style="
        position:relative;
        width:36px;height:44px;
        display:flex;align-items:center;justify-content:center;
      ">
        <div style="
          background:${avatar ? '#fff' : color};
          width:36px;height:36px;
          border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);
          border:3px solid #fff;
          box-shadow:0 3px 10px rgba(0,0,0,0.5);
          overflow:hidden;
        ">${avatar ? `<div style="transform:rotate(45deg);width:100%;height:100%;display:flex;align-items:center;justify-content:center">${content}</div>` : ''}</div>
        ${!avatar ? `<span style="
          position:absolute;
          top:4px;left:0;width:36px;
          text-align:center;
          color:#fff;font-weight:700;font-size:14px;
          font-family:'Mulish','Segoe UI',sans-serif;
        ">${letter}</span>` : ''}
      </div>`,
      iconSize: [36, 44], iconAnchor: [18, 44], popupAnchor: [0, -46]
    });
  }

  async function placeMarker(username, lat, lng, updatedAt) {
    const timeStr = updatedAt ? new Date(updatedAt).toLocaleTimeString('ru') : '';
    const popupHtml = `<div class="popup-content">
      <strong>${username}</strong>
      <small>${timeStr ? 'Обновлено: ' + timeStr : ''}</small>
      <br><button class="popup-chat-btn" onclick="window.openChatWith('${username}')">💬 Написать</button>
    </div>`;
    const avatar = await getAvatar(username);
    if (markers[username]) {
      markers[username].setLatLng([lat, lng]).setPopupContent(popupHtml).setIcon(makeIcon(username, avatar));
    } else {
      markers[username] = L.marker([lat, lng], { icon: makeIcon(username, avatar) })
        .addTo(map).bindPopup(popupHtml);
    }
  }

  function removeMarker(username) {
    if (markers[username]) { map.removeLayer(markers[username]); delete markers[username]; }
  }

  // ── AUTH ─────────────────────────────────────────────────────────
  let isRegister = false;
  document.getElementById('auth-switch').onclick = () => {
    isRegister = !isRegister;
    document.getElementById('auth-btn').textContent = isRegister ? 'Зарегистрироваться' : 'Войти';
    document.getElementById('auth-switch').textContent = isRegister ? 'Войти' : 'Зарегистрироваться';
    document.querySelector('.auth-box p').textContent = isRegister
      ? 'Создайте аккаунт' : 'Отслеживай друзей на карте мира';
    document.getElementById('auth-error').textContent = '';
  };

  document.getElementById('auth-btn').onclick = async () => {
    const name = document.getElementById('auth-name').value.trim();
    const pass = document.getElementById('auth-pass').value;
    const errEl = document.getElementById('auth-error');
    errEl.textContent = '';
    if (!name || !pass) { errEl.textContent = 'Заполните все поля'; return; }
    if (!/^[a-zA-Zа-яА-Я0-9_]+$/.test(name)) { errEl.textContent = 'Только буквы, цифры и _'; return; }

    const userRef = ref(db, `users/${name}`);
    const snap = await get(userRef);

    if (isRegister) {
      if (snap.exists()) { errEl.textContent = 'Имя уже занято'; return; }
      await set(userRef, { password: btoa(pass), createdAt: Date.now() });
    } else {
      if (!snap.exists()) { errEl.textContent = 'Пользователь не найден'; return; }
      if (snap.val().password !== btoa(pass)) { errEl.textContent = 'Неверный пароль'; return; }
    }

    currentUser = name;
    localStorage.setItem('fm_user', name);
    localStorage.setItem('fm_pass', btoa(pass));
    startApp();
  };

  document.getElementById('auth-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-pass').focus(); });
  document.getElementById('auth-pass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-btn').click(); });

  // ── APP START ────────────────────────────────────────────────────
  function updateProfileBtn(avatar) {
    const btn = document.getElementById('current-user-badge');
    if (avatar) {
      btn.innerHTML = `<img src="${avatar}" />`;
    } else {
      btn.textContent = currentUser[0].toUpperCase();
    }
  }

  function startApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('current-user-badge').textContent = '👤';
    loadFriends();
    map.invalidateSize();
    getAvatar(currentUser).then(updateProfileBtn);
    requestNotifPermission();
    if (!navigator.geolocation) {
      alert('Геолокация не поддерживается браузером');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        map.setView([lat, lng], 13);
        set(ref(db, `locations/${currentUser}`), { lat, lng, updatedAt: Date.now() });
        placeMarker(currentUser, lat, lng, Date.now());
      },
      err => {
        const codes = { 1: 'Доступ запрещён — разреши геолокацию в браузере', 2: 'Позиция недоступна', 3: 'Таймаут' };
        alert('Ошибка геолокации: ' + (codes[err.code] || err.message));
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  document.getElementById('btn-logout').onclick = () => {
    localStorage.removeItem('fm_user'); localStorage.removeItem('fm_pass');
    location.reload();
  };

  // ── LOCATION ─────────────────────────────────────────────────────
  let sharingInterval = null;

  function shareLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      set(ref(db, `locations/${currentUser}`), { lat, lng, updatedAt: Date.now() });
      placeMarker(currentUser, lat, lng, Date.now());
      map.setView([lat, lng], 13);
    }, err => {
      const codes = { 1: 'Доступ запрещён', 2: 'Позиция недоступна', 3: 'Таймаут' };
      alert('Ошибка: ' + (codes[err.code] || err.message));
    }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
  }

  document.getElementById('btn-share-location').onclick = () => {
    if (!navigator.geolocation) { alert('Геолокация не поддерживается'); return; }
    const btn = document.getElementById('btn-share-location');
    if (sharingInterval) {
      clearInterval(sharingInterval);
      sharingInterval = null;
      btn.innerHTML = '📍 <span class="share-text">Поделиться локацией</span>';
      btn.classList.remove('active');
    } else {
      shareLocation();
      sharingInterval = setInterval(shareLocation, 30000);
      btn.innerHTML = '<span class="pulse-dot"></span> <span class="share-text">Трансляция...</span>';
      btn.classList.add('active');
    }
  };

  // ── FRIENDS ──────────────────────────────────────────────────────
  function loadFriends() {
    onValue(ref(db, `friends/${currentUser}`), snap => {
      friends = snap.val() || {};
      renderFriends();
      Object.keys(friends).forEach(watchFriendLocation);
    });
  }

  document.getElementById('btn-add-friend').onclick = addFriend;
  document.getElementById('friend-input').addEventListener('keydown', e => { if (e.key === 'Enter') addFriend(); });

  async function addFriend() {
    const name = document.getElementById('friend-input').value.trim();
    if (!name || name === currentUser) return;
    const snap = await get(ref(db, `users/${name}`));
    if (!snap.exists()) { alert('Пользователь не найден'); return; }
    await set(ref(db, `friends/${currentUser}/${name}`), true);
    await set(ref(db, `friends/${name}/${currentUser}`), true);
    document.getElementById('friend-input').value = '';
  }

  async function renderFriends() {
    const list = document.getElementById('friends-list');
    const names = Object.keys(friends);
    if (!names.length) {
      list.innerHTML = '<div class="empty-state">Добавьте друзей по имени</div>';
      return;
    }
    list.innerHTML = '';
    for (const name of names) {
      const color = colorFor(name);
      const avatar = await getAvatar(name);
      const div = document.createElement('div');
      div.className = 'friend-item';
      div.innerHTML = `
        <div class="friend-avatar" style="background:${avatar ? 'transparent' : color}">${avatar ? `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />` : name[0].toUpperCase()}</div>
        <div class="friend-info">
          <div class="friend-name">${name}</div>
          <div class="friend-status" id="status-${name}">нет данных</div>
        </div>
        <div class="online-dot offline-dot" id="dot-${name}"></div>
        <button class="btn-chat-small" onclick="window.openChatWith('${name}')">💬</button>
      `;
      div.querySelector('.friend-avatar').onclick = () => window.openFriendProfile(name);
      list.appendChild(div);
    }
  }

  const watchedChats = new Set();
  function watchFriendChat(name) {
    if (watchedChats.has(name)) return;
    watchedChats.add(name);
    const chatId = getChatId(currentUser, name);
    let lastTs = Date.now();
    onValue(ref(db, `chats/${chatId}`), snap => {
      if (!snap.exists()) return;
      const msgs = Object.values(snap.val());
      msgs.forEach(msg => {
        if (msg.from !== currentUser && (msg.ts || 0) > lastTs) {
          showNotif(msg.from, msg.text || '💬 Сообщение');
        }
      });
      const tsList = msgs.map(m => m.ts).filter(Boolean);
      if (tsList.length) lastTs = Math.max(...tsList);
    });
  }

  const watchedFriends = new Set();
  function watchFriendLocation(name) {
    if (watchedFriends.has(name)) return;
    watchedFriends.add(name);
    watchFriendChat(name);
    onValue(ref(db, `locations/${name}`), snap => {
      const dotEl = document.getElementById(`dot-${name}`);
      const statusEl = document.getElementById(`status-${name}`);
      if (snap.exists()) {
        const { lat, lng, updatedAt } = snap.val();
        placeMarker(name, lat, lng, updatedAt);
        const timeStr = new Date(updatedAt).toLocaleTimeString('ru');
        if (statusEl) statusEl.textContent = `📍 ${timeStr}`;
        if (dotEl) { dotEl.classList.remove('offline-dot'); }
      } else {
        removeMarker(name);
        if (statusEl) statusEl.textContent = 'нет данных';
        if (dotEl) dotEl.classList.add('offline-dot');
      }
    });
  }

  // ── CHAT ─────────────────────────────────────────────────────────
  window.openChatWith = name => {
    chatWith = name;
    document.getElementById('chat-with-name').textContent = name;
    switchTab('chat');
    loadMessages();
  };

  function getChatId(a, b) { return [a, b].sort().join('__'); }

  function loadMessages() {
    if (chatUnsub) chatUnsub();
    if (!chatWith) return;
    const chatId = getChatId(currentUser, chatWith);
    const msgsRef = ref(db, `chats/${chatId}`);
    chatUnsub = onValue(msgsRef, snap => {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      if (!snap.exists()) {
        container.innerHTML = '<div class="empty-state">Начните общение!</div>';
        return;
      }
      Object.values(snap.val()).forEach(msg => {
        const div = document.createElement('div');
        div.className = 'msg ' + (msg.from === currentUser ? 'mine' : 'theirs');
        div.innerHTML = msg.from !== currentUser
          ? `<div class="msg-sender">${msg.from}</div>${escHtml(msg.text)}`
          : escHtml(msg.text);
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    });
  }

  document.getElementById('btn-send').onclick = sendMessage;
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !chatWith) return;
    const chatId = getChatId(currentUser, chatWith);
    push(ref(db, `chats/${chatId}`), { from: currentUser, text, ts: serverTimestamp() });
    input.value = '';
  }

  // ── PROFILE ───────────────────────────────────────────────────────
  document.getElementById('current-user-badge').onclick = async () => {
    const snap = await get(ref(db, `users/${currentUser}`));
    const data = snap.val() || {};
    const avatar = data.avatar || null;
    const color = colorFor(currentUser);
    const avatarEl = document.getElementById('my-profile-avatar');
    avatarEl.style.background = avatar ? 'transparent' : color;
    avatarEl.innerHTML = avatar ? `<img src="${avatar}" />` : currentUser[0].toUpperCase();
    document.getElementById('my-profile-name').textContent = currentUser;
    document.getElementById('my-profile-meta').textContent = data.createdAt
      ? 'Зарегистрирован: ' + new Date(data.createdAt).toLocaleDateString('ru')
      : '';
    document.getElementById('profile-modal').classList.add('show');
  };

  document.getElementById('btn-close-profile').onclick = () =>
    document.getElementById('profile-modal').classList.remove('show');

  document.getElementById('btn-open-avatar').onclick = () => {
    document.getElementById('profile-modal').classList.remove('show');
    openAvatarModal();
  };

  let friendProfileTarget = null;
  window.openFriendProfile = async name => {
    friendProfileTarget = name;
    const snap = await get(ref(db, `users/${name}`));
    const data = snap.val() || {};
    const avatar = data.avatar || null;
    const color = colorFor(name);
    const avatarEl = document.getElementById('friend-profile-avatar');
    avatarEl.style.background = avatar ? 'transparent' : color;
    avatarEl.innerHTML = avatar ? `<img src="${avatar}" />` : name[0].toUpperCase();
    document.getElementById('friend-profile-name').textContent = name;
    document.getElementById('friend-profile-meta').textContent = data.createdAt
      ? 'Зарегистрирован: ' + new Date(data.createdAt).toLocaleDateString('ru')
      : '';
    document.getElementById('friend-profile-modal').classList.add('show');
  };

  document.getElementById('btn-close-friend-profile').onclick = () =>
    document.getElementById('friend-profile-modal').classList.remove('show');

  document.getElementById('btn-profile-chat').onclick = () => {
    document.getElementById('friend-profile-modal').classList.remove('show');
    window.openChatWith(friendProfileTarget);
  };

  // ── AVATAR ───────────────────────────────────────────────────────
  function openAvatarModal() {
    selectedAvatar = null;
    const preview = document.getElementById('avatar-preview');
    preview.style.display = 'none';
    preview.src = '';
    document.getElementById('avatar-file-input').value = '';
    document.getElementById('avatar-modal').classList.add('show');
  }

  document.getElementById('avatar-upload-label').onclick = () =>
    document.getElementById('avatar-file-input').click();

  document.getElementById('avatar-file-input').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      selectedAvatar = ev.target.result;
      const preview = document.getElementById('avatar-preview');
      preview.src = selectedAvatar;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  };

  document.getElementById('btn-cancel-avatar').onclick = () => {
    document.getElementById('avatar-modal').classList.remove('show');
    selectedAvatar = null;
  };

  document.getElementById('btn-save-avatar').onclick = async () => {
    if (!selectedAvatar) { alert('Выбери фото'); return; }
    await set(ref(db, `users/${currentUser}/avatar`), selectedAvatar);
    document.getElementById('avatar-modal').classList.remove('show');
    selectedAvatar = null;
    updateProfileBtn(await getAvatar(currentUser));
    if (markers[currentUser]) {
      const pos = markers[currentUser].getLatLng();
      removeMarker(currentUser);
      placeMarker(currentUser, pos.lat, pos.lng, Date.now());
    }
    renderFriends();
  };

  // ── TABS ─────────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => switchTab(tab.dataset.tab);
  });

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.getElementById('tab-friends').style.display = name === 'friends' ? 'block' : 'none';
    document.getElementById('tab-chat').style.display = name === 'chat' ? 'flex' : 'none';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── NOTIFICATIONS ───────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  async function requestNotifPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') await Notification.requestPermission();
  }

  function showNotif(from, text) {
    if (document.visibilityState === 'visible' && chatWith === from) return;
    if (Notification.permission !== 'granted') return;
    new Notification('💬 ' + from, { body: text, icon: 'img/stikers.png' });
  }

  // ── AUTO LOGIN ───────────────────────────────────────────────────
  const savedUser = localStorage.getItem('fm_user');
  const savedPass = localStorage.getItem('fm_pass');
  if (savedUser && savedPass) {
    get(ref(db, `users/${savedUser}`)).then(snap => {
      if (snap.exists() && snap.val().password === savedPass) {
        currentUser = savedUser;
        startApp();
      }
    });
  }
</script>
</body>
</html>
